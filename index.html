<!DOCTYPE html>
<html>
  <head>
<meta charset="utf-8" />
   <title>Artifice</title>
           <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
          <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.3/dist/aframe-physics-system.min.js"></script>
  </head>
  
  <body>
    <!-- Basic set up of a scene (what will be seen when the code is live)-->
    <a-scene physics="gravity: 0 -9.8 0"> 

     
      <a-assets>
        <img id="grassTexture" src="assets/grass.png"> 
  
        <img id="floorTexture" src="assets/woodfloor.png">

        <img id="skyTexture" src="assets/cityscene.png">

        <img id="portraitTexture" src="assets/portrait1.jpg">
        
      </a-assets>

      <!-- Camera -->
      <a-entity position="0 0.8 4" movement-controls="speed: 0.15" kinematic-body>
        <a-camera></a-camera>
      </a-entity>

      <!-- Sky -->
      <a-sky 
      position="0 460 0"
      rotation="0 -90 0"
      height="1000"
      src="#skyTexture">
    </a-sky>

      <!-- Ground -->
    <a-plane
    position="0 -0.05 -9"
    rotation="-90 0 0"
    width="1000"
    height="1000"
    src="#grassTexture"
    repeat="200 200"
    static-body>                                                                                                                    
  </a-plane>

   <!-- Room floor and ceiling -->
      <a-box position="0 0 -4" width="10" height="0.1" depth="6" src="#floorTexture" repeat="3 2" static-body></a-box>
      <a-box position="0 6 -4" width="10" height="0.1" depth="6" color="#d9eaff" static-body></a-box>

  <!-- Walls -->
      <a-box position="5 3 -4" width="0.1" height="6" depth="6" color="#FFFFFF" static-body></a-box>
      <a-box position="-5 3 -4" width="0.1" height="6" depth="6" color="#FFFFFF" static-body></a-box>

      <!--portraits in Room 1-->
      <a-box position="4.9 3 -4" width="0.1" height="3" depth="3" src="#portraitTexture" static-body></a-box>
      <a-box position="-4.9 4 -3" width="0.1" height="2" depth="2" color="#89CFF0" static-body></a-box>
      <a-box position="-4.9 2 -5.5" width="0.1" height="2" depth="2" color="#89CFF0" static-body></a-box>

      <!-- Back wall of Room 1 with opening for corridor -->
      <a-box position="-3.5 3 -7" width="3" height="6" depth="0.1" color="#FFFFFF" static-body></a-box>
      <a-box position="3.5 3 -7" width="3" height="6" depth="0.1" color="##FFFFFF" static-body></a-box>
      <a-box position="0 5.2 -7" width="4" height="1.6" depth="0.1" color="#FFFFFF" static-body></a-box>

      <!-- Corridor -->
      <a-box position="0 0 -9" width="4" height="0.1" depth="4" src="#floorTexture" static-body></a-box>
      <a-box position="0 6 -9" width="4" height="0.1" depth="4" color="#d9eaff" static-body></a-box>
      <a-box position="-2 3 -9" width="0.1" height="6" depth="4" color="##FFFFFF" static-body></a-box>
      <a-box position="2 3 -9" width="0.1" height="6" depth="4" color="##FFFFFF" static-body></a-box>

      <!-- Back wall of Room 2 with opening for cooridor-->
      <a-box position="-3.5 3 -11" width="3" height="6" depth="0.1" color="#FFFFFF" static-body></a-box>
      <a-box position="3.5 3 -11" width="3" height="6" depth="0.1" color="#FFFFFF" static-body></a-box>
      <a-box position="0 5.2 -11" width="4" height="1.6" depth="0.1" color="#FFFFFF" static-body></a-box>

      <!-- Room 2 floor and ceiling -->
      <a-box position="0 0 -14" width="10" height="0.1" depth="6" src="#floorTexture" repeat="3 2" static-body></a-box>
      <a-box position="0 6 -14" width="10" height="0.1" depth="6" color="#d9eaff" static-body></a-box>

      <!-- Room 2 walls -->
      <a-box position="-5 3 -14" width="0.1" height="6" depth="6" color="#FFFFFF" static-body></a-box>
      <a-box position="5 3 -14" width="0.1" height="6" depth="6" color="#FFFFFF" static-body></a-box>
      <a-box position="0 3 -17" width="10" height="6" depth="0.1" color="#FFFFFF" static-body></a-box>


    </a-scene>

  </body>
  
  </html>
