<!DOCTYPE html>
<html>
  <head>
<meta charset="utf-8" />
   <title>Artifice</title>
           <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
          <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.3/dist/aframe-physics-system.min.js"></script>
  </head>
  
  <body>
    <!-- Basic set up of a scene (what will be seen when the code is live)-->
    <a-scene physics="gravity: 0 -9.8 0"> 

     
      <a-assets>
        <img id="grassTexture" src="assets/grass.png"> 
  
        <img id="floorTexture" src="assets/woodfloor.png">

        <img id="skyTexture" src="assets/cityscene.png">

        <img id="portraitTexture" src="assets/portrait1.jpg">
        
        <img id="myimage" src="assets/sculpture1.png">

      </a-assets>

      <!-- Camera -->
      <a-entity position="0 0.8 4" movement-controls="speed: 0.15" kinematic-body>
        <a-camera></a-camera>
      </a-entity>

      <!-- Sky -->
      <a-sky 
      position="0 460 0"
      height="1000"
      src="#skyTexture">
    </a-sky>

      <!-- Ground -->
    <a-plane
    position="0 -0.05 -9"
    rotation="-90 0 0"
    width="1000"
    height="1000"
    src="#grassTexture"
    repeat="200 200"
    static-body>                                                                                                                    
  </a-plane>

  <!-- Lighting -->
  <a-entity light="type: directional; color: #EEE; intensity: 0.6" position="0 90 0"></a-entity>
  <a-light type="ambient" color="#445451"></a-light>
  <a-light type="point" intensity="1" position="0 4 4"></a-light>

  <!-- shapes as part of the scene-->
  <a-sphere position="-20 0 2" color="red" radius="5"></a-sphere>
  <a-entity rotation="0 0 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000">
        <a-sphere position="5 10 3" color="mediumseagreen" radius="1"></a-sphere>
  </a-entity>
  <a-entity rotation="0 5 0" animation="property: rotation; to: 0 -360 0; loop: true; dur: 10000">
        <a-tetrahedron position="5 12 5" color="yellow" radius="1"></a-tetrahedron>
  </a-entity>
  <a-cone position="-26 0 8"color="blue" radius-bottom="10" radius-top="0.2" height="30"></a-cone>

   <!-- Room floor and ceiling -->
      <a-box position="0 0 -4" width="10" height="0.1" depth="6" src="#floorTexture" repeat="3 2" static-body></a-box>
      <a-box position="0 6 -4" width="10" height="0.1" depth="6" color="#d9eaff" static-body></a-box>

  <!-- Walls -->
      <a-box position="5 3 -4" width="0.1" height="6" depth="6" color="#FFFFFF" static-body></a-box>
      <a-box position="-5 3 -4" width="0.1" height="6" depth="6" color="#FFFFFF" static-body></a-box>

      <!--portraits in Room 1, blue color as current placeholder-->
      <a-box position="4.9 3 -4" width="0.1" height="3" depth="3.2" src="#portraitTexture" static-body></a-box>
      <a-box position="-4.9 4 -4" width="0.1" height="2" depth="4" src="assets/portrait2.png" static-body></a-box>
      <a-box position="3.5 3 -6.9" width="2" height="1.6" depth="0.1" src="assets/portrait5.png" static-body></a-box>
      <a-box position="-4.9 1.8 -4" width="0.1" height="2" depth="2.7" src="assets/portrait3.png" static-body></a-box>
      <a-box position="-3.5 3 -6.9" width="2.2" height="3" depth="0.1" src="assets/portrait4.jpg" static-body></a-box>

      <!-- Back wall of Room 1 with opening for corridor -->
      <a-box position="-3.5 3 -7" width="3" height="6" depth="0.1" color="#FFFFFF" static-body></a-box>
      <a-box position="3.5 3 -7" width="3" height="6" depth="0.1" color="##FFFFFF" static-body></a-box>
      <a-box position="0 5.2 -7" width="4" height="1.6" depth="0.1" color="#FFFFFF" static-body></a-box>

      <!-- front wall of Room 1 with opening for door -->
      <a-box position="-3.5 3 -1" width="3" height="6" depth="0.1" color="#FFFFFF" static-body></a-box>
      <a-box position="3.5 3 -1" width="3" height="6" depth="0.1" color="##FFFFFF" static-body></a-box>
      <a-box position="0 5.2 -1" width="4" height="1.6" depth="0.1" color="#FFFFFF" static-body></a-box>

      <a-entity
  geometry="primitive: plane; width: 4; height: 1"
  material="color: black"
  text="value: Artifice Gallery; align:center; colour: #000; width: 5; height: 5" 
  position="0 5.2 -0.8">
</a-entity>

      <!-- Corridor -->
      <a-box position="0 0 -9" width="4" height="0.1" depth="4" src="#floorTexture" static-body></a-box>
      <a-box position="0 6 -9" width="4" height="0.1" depth="4" color="#d9eaff" static-body></a-box>
      <a-box position="-2 3 -9" width="0.1" height="6" depth="4" color="##FFFFFF" static-body></a-box>
      <a-box position="2 3 -9" width="0.1" height="6" depth="4" color="##FFFFFF" static-body></a-box>

      <!-- Back wall of Room 2 with opening for cooridor-->
      <a-box position="-3.5 3 -11" width="3" height="6" depth="0.1" color="#FFFFFF" static-body></a-box>
      <a-box position="3.5 3 -11" width="3" height="6" depth="0.1" color="#FFFFFF" static-body></a-box>
      <a-box position="0 5.2 -11" width="4" height="1.6" depth="0.1" color="#FFFFFF" static-body></a-box>

      <!-- Room 2 floor and ceiling -->
      <a-box position="0 0 -14" width="10" height="0.1" depth="6" src="#floorTexture" repeat="3 2" static-body></a-box>
      <a-box position="0 6 -14" width="10" height="0.1" depth="6" color="#d9eaff" static-body></a-box>

      <!-- displays in Room 2-->
       <a-box position="3 0 -14" width="2" height="2" depth="4" color="#F5F5F5" static-body></a-box>
       <a-box position="-3 0 -14" width="1.5" height="3" depth="1.5" color="#F5F5F5" static-body></a-box>


      <!-- Room 2 walls -->
      <a-box position="-5 3 -14" width="0.1" height="6" depth="6" color="#FFFFFF" static-body></a-box>
      <a-box position="5 3 -14" width="0.1" height="6" depth="6" color="#FFFFFF" static-body></a-box>
      <a-box position="0 3 -17" width="10" height="6" depth="0.1" color="#FFFFFF" static-body></a-box>

      <!-- artwork in Room 2 -->
       <a-image 
       position="-3 3 -14.1"
       rotation="0 90 0"
       width="3.2"
       height="4"
       src="#myimage"></a-image>

       <a-image 
       position="3 1.9 -14.2"
       rotation="0 -90 0"
       width="4.45"
       height="6"
       src="assets/sculpture2.png"></a-image>


    </a-scene>

  </body>
  
  </html>
